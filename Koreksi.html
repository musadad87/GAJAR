<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Koreksi LJK AI</title>
    
    <!-- Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel untuk kompilasi JSX di browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom scrollbar class */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- KOMPONEN IKON (Pengganti Lucide-React agar standalone) ---
        const IconBase = ({ children, className = "w-6 h-6" }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                {children}
            </svg>
        );
        const Camera = (p) => <IconBase {...p}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></IconBase>;
        const Upload = (p) => <IconBase {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></IconBase>;
        const Settings = (p) => <IconBase {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></IconBase>;
        const FileSpreadsheet = (p) => <IconBase {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></IconBase>;
        const CheckCircle = (p) => <IconBase {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconBase>;
        const XCircle = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></IconBase>;
        const AlertCircle = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></IconBase>;
        const Loader2 = (p) => <IconBase className={`animate-spin ${p.className}`}><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></IconBase>;
        const ImageIcon = (p) => <IconBase {...p}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></IconBase>;
        const Database = (p) => <IconBase {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></IconBase>;

        // --- KONFIGURASI UTAMA ---
        const OPTIONS = ['a', 'b', 'c', 'd', 'e'];

        // API Key akan otomatis disediakan oleh environment (tidak perlu diset manual jika menggunakan fitur preview)
        const apiKey = ""; 

        const analyzeImageWithGemini = async (base64Image, totalQuestions) => {
            const prompt = `Anda adalah asisten AI ahli pengoreksi ujian. Baca gambar Lembar Jawaban (LJK) ini secara teliti. Terdapat ${totalQuestions} soal pilihan ganda (nomor 1 sampai ${totalQuestions}) dengan opsi a, b, c, d, e.
          Tugas Anda:
          1. Identifikasi pilihan mana yang diberi tanda silang (X) oleh siswa untuk setiap nomor (1 sampai ${totalQuestions}).
          2. Perhatikan aturan perbaikan (sesuai petunjuk di kertas): Jika ada jawaban awal yang dicoret (misal dengan garis dua horizontal), abaikan itu dan cari tanda silang (X) yang baru di nomor tersebut.
          3. Kembalikan HANYA format JSON murni yang berisi pasangan nomor soal (sebagai string) dan jawaban (sebagai string huruf kecil 'a', 'b', 'c', 'd', atau 'e'). Jika nomor tersebut tidak dijawab, dibiarkan kosong, atau tidak terbaca, gunakan nilai null.
          Contoh output wajib (tanpa teks awalan/akhiran apapun, murni JSON):
          {"1":"a","2":"c","3":null,"4":"e" ... dan seterusnya sampai ${totalQuestions}}
          Jangan tambahkan karakter markdown (\`\`\`json) atau teks apapun selain objek JSON itu sendiri.`;

            const payload = {
                contents: [
                {
                    role: "user",
                    parts: [
                    { text: prompt },
                    { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                    ]
                }
                ]
            };

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const retries = 5;
            const delays = [1000, 2000, 4000, 8000, 16000];
            
            for (let i = 0; i < retries; i++) {
                try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                const textResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (!textResponse) throw new Error("Respons AI kosong.");

                let cleanJsonStr = textResponse.replace(/```json/g, '').replace(/```/g, '').trim();
                
                try {
                    return JSON.parse(cleanJsonStr);
                } catch (e) {
                    console.error("Failed to parse JSON from AI:", cleanJsonStr);
                    throw new Error("AI tidak mengembalikan format data yang valid.");
                }

                } catch (error) {
                if (i === retries - 1) throw error;
                await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        };

        const fileToBase64 = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]); 
                reader.onerror = error => reject(error);
            });
        };

        // --- KOMPONEN UTAMA ---
        function App() {
            const [activeTab, setActiveTab] = useState('setup');
            
            // State untuk Jumlah Soal (Dinamis)
            const [totalQuestions, setTotalQuestions] = useState(40);
            
            // Siapkan state kunci jawaban lebih panjang untuk antisipasi (max 50)
            const [answerKey, setAnswerKey] = useState(() => {
                const initial = {};
                for (let i = 1; i <= 50; i++) initial[i] = '';
                return initial;
            });

            const [studentName, setStudentName] = useState('');
            const [imageFile, setImageFile] = useState(null);
            const [imagePreview, setImagePreview] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [currentResult, setCurrentResult] = useState(null);
            const [notification, setNotification] = useState(null);

            const [resultsDB, setResultsDB] = useState([]);

            const fileInputRef = useRef(null);
            const cameraInputRef = useRef(null);

            const showNotification = (message, type = 'info') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 5000);
            };

            const handleAnswerKeyChange = (num, value) => {
                setAnswerKey(prev => ({ ...prev, [num]: value }));
            };

            // Pengecekan kunci jawaban menyesuaikan dengan jumlah soal yang dipilih
            const isAnswerKeyComplete = () => {
                for (let i = 1; i <= totalQuestions; i++) {
                    if (!answerKey[i]) return false;
                }
                return true;
            };

            const handleImageUpload = async (e) => {
                const file = e.target.files[0];
                if (file) {
                if (!file.type.startsWith('image/')) {
                    showNotification("File harus berupa gambar (JPG/PNG).", "error");
                    return;
                }
                setImageFile(file);
                
                const reader = new FileReader();
                reader.onloadend = () => {
                    setImagePreview(reader.result);
                };
                reader.readAsDataURL(file);
                setCurrentResult(null); 
                }
            };

            const handleProcessImage = async () => {
                if (!studentName.trim()) {
                showNotification("Masukkan nama siswa terlebih dahulu.", "error");
                return;
                }
                if (!imageFile) {
                showNotification("Unggah gambar lembar jawaban terlebih dahulu.", "error");
                return;
                }
                if (!isAnswerKeyComplete()) {
                showNotification(`Kunci jawaban belum lengkap untuk ${totalQuestions} soal! Silakan lengkapi di menu Setup Kunci.`, "error");
                return;
                }

                setIsProcessing(true);
                setCurrentResult(null);

                try {
                const base64Image = await fileToBase64(imageFile);
                // Parsing total questions parameter ke AI
                const studentAnswers = await analyzeImageWithGemini(base64Image, totalQuestions);

                let correct = 0;
                let wrong = 0;
                let empty = 0;
                const details = {};

                for (let i = 1; i <= totalQuestions; i++) {
                    const studentAns = studentAnswers[i.toString()]?.toLowerCase();
                    const correctAns = answerKey[i.toString()]?.toLowerCase();
                    
                    let status = 'empty';
                    if (studentAns) {
                    if (studentAns === correctAns) {
                        correct++;
                        status = 'correct';
                    } else {
                        wrong++;
                        status = 'wrong';
                    }
                    } else {
                    empty++;
                    }
                    
                    details[i] = {
                    studentAnswer: studentAns || '-',
                    correctAnswer: correctAns,
                    status: status
                    };
                }

                const score = Math.round((correct / totalQuestions) * 100);

                const result = {
                    id: Date.now(),
                    date: new Date().toLocaleString('id-ID'),
                    name: studentName,
                    score: score,
                    correct: correct,
                    wrong: wrong,
                    empty: empty,
                    details: details
                };

                setCurrentResult(result);
                setResultsDB(prev => [result, ...prev]);
                showNotification(`Selesai! Nilai ${studentName}: ${score}`, "success");

                } catch (error) {
                console.error(error);
                showNotification(error.message || "Terjadi kesalahan saat memproses gambar.", "error");
                } finally {
                setIsProcessing(false);
                }
            };

            const resetForm = () => {
                setStudentName('');
                setImageFile(null);
                setImagePreview(null);
                setCurrentResult(null);
                if (fileInputRef.current) fileInputRef.current.value = '';
                if (cameraInputRef.current) cameraInputRef.current.value = '';
            };

            const exportToCSV = () => {
                if (resultsDB.length === 0) {
                showNotification("Belum ada data untuk diexport.", "error");
                return;
                }

                const headers = ["Waktu", "Nama Siswa", "Nilai Akhir", "Benar", "Salah", "Kosong"];
                for (let i = 1; i <= totalQuestions; i++) {
                headers.push(`Soal ${i}`);
                }

                const csvRows = [];
                csvRows.push(headers.join(','));

                resultsDB.forEach(row => {
                const rowData = [
                    `"${row.date}"`,
                    `"${row.name}"`,
                    row.score,
                    row.correct,
                    row.wrong,
                    row.empty
                ];
                for (let i = 1; i <= totalQuestions; i++) {
                    rowData.push(`"${row.details[i]?.studentAnswer?.toUpperCase() || '-'}"`);
                }
                csvRows.push(rowData.join(','));
                });

                const csvString = csvRows.join('\n');
                const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                
                link.setAttribute('href', url);
                link.setAttribute('download', `Hasil_Koreksi_LJK_${new Date().getTime()}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const clearDatabase = () => {
                const confirmed = window.confirm("Apakah Anda yakin ingin menghapus SEMUA data hasil koreksi?");
                if (confirmed) setResultsDB([]);
            };

            return (
                <div className="min-h-screen text-slate-800 font-sans pb-20">
                <header className="bg-indigo-600 text-white shadow-md sticky top-0 z-10">
                    <div className="max-w-5xl mx-auto px-4 py-4">
                    <div className="flex items-center gap-2">
                        <CheckCircle className="w-6 h-6 text-indigo-200" />
                        <h1 className="text-xl font-bold tracking-tight">KoreksiAI LJK</h1>
                    </div>
                    </div>
                    
                    <div className="max-w-5xl mx-auto px-4 flex overflow-x-auto no-scrollbar">
                    <button 
                        onClick={() => setActiveTab('setup')}
                        className={`flex items-center gap-2 px-4 py-3 border-b-4 whitespace-nowrap transition-colors ${activeTab === 'setup' ? 'border-indigo-300 font-semibold text-white' : 'border-transparent text-indigo-200 hover:text-white'}`}
                    >
                        <Settings className="w-4 h-4" /> Setup Kunci
                    </button>
                    <button 
                        onClick={() => setActiveTab('koreksi')}
                        className={`flex items-center gap-2 px-4 py-3 border-b-4 whitespace-nowrap transition-colors ${activeTab === 'koreksi' ? 'border-indigo-300 font-semibold text-white' : 'border-transparent text-indigo-200 hover:text-white'}`}
                    >
                        <Camera className="w-4 h-4" /> Koreksi LJK
                    </button>
                    <button 
                        onClick={() => setActiveTab('database')}
                        className={`flex items-center gap-2 px-4 py-3 border-b-4 whitespace-nowrap transition-colors ${activeTab === 'database' ? 'border-indigo-300 font-semibold text-white' : 'border-transparent text-indigo-200 hover:text-white'}`}
                    >
                        <Database className="w-4 h-4" /> Data Hasil
                        {resultsDB.length > 0 && (
                        <span className="bg-indigo-500 text-xs px-2 py-0.5 rounded-full">{resultsDB.length}</span>
                        )}
                    </button>
                    </div>
                </header>

                {notification && (
                    <div className="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 w-11/12 max-w-md transition-opacity duration-300">
                    <div className={`p-4 rounded-lg shadow-lg flex items-start gap-3 ${notification.type === 'error' ? 'bg-red-50 text-red-800 border border-red-200' : 'bg-green-50 text-green-800 border border-green-200'}`}>
                        {notification.type === 'error' ? <AlertCircle className="w-5 h-5 shrink-0" /> : <CheckCircle className="w-5 h-5 shrink-0" />}
                        <p className="text-sm font-medium">{notification.message}</p>
                    </div>
                    </div>
                )}

                <main className="max-w-5xl mx-auto p-4 py-6">
                    
                    {activeTab === 'setup' && (
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                        
                        {/* Input Jumlah Soal */}
                        <div className="mb-6 bg-slate-50 p-4 rounded-lg border border-slate-200 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                            <div>
                                <label className="block text-sm font-bold text-slate-800">Jumlah Soal</label>
                                <p className="text-xs text-slate-500">Tentukan batas soal yang akan dikoreksi (Maks 50)</p>
                            </div>
                            <input
                                type="number"
                                min="1"
                                max="50"
                                value={totalQuestions}
                                onChange={(e) => {
                                    let val = parseInt(e.target.value);
                                    if (val > 50) val = 50;
                                    if (val < 1) val = 1;
                                    setTotalQuestions(val || 1);
                                }}
                                className="w-24 rounded-lg border border-slate-300 p-2 text-center font-bold focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none"
                            />
                        </div>

                        <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-4 gap-4">
                            <div>
                                <h2 className="text-lg font-bold text-slate-800">Kunci Jawaban Pilihan Ganda</h2>
                                <p className="text-sm text-slate-500">Masukkan kunci jawaban yang benar untuk {totalQuestions} soal.</p>
                            </div>
                            <div className="text-sm">
                                Status: <span className={isAnswerKeyComplete() ? "text-green-600 font-bold" : "text-amber-600 font-bold"}>
                                {isAnswerKeyComplete() ? `Lengkap (${totalQuestions}/${totalQuestions})` : 'Belum Lengkap'}
                                </span>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-8 gap-3">
                        {Array.from({ length: totalQuestions }).map((_, idx) => {
                            const num = idx + 1;
                            return (
                            <div key={num} className="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border border-slate-100">
                                <label className="text-sm font-medium text-slate-500 w-6 text-right">{num}.</label>
                                <select
                                value={answerKey[num]}
                                onChange={(e) => handleAnswerKeyChange(num, e.target.value)}
                                className={`flex-1 text-sm rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-1.5 bg-white outline-none ${answerKey[num] ? 'font-bold text-indigo-700' : 'text-slate-400'}`}
                                >
                                <option value="">-</option>
                                {OPTIONS.map(opt => (
                                    <option key={opt} value={opt}>{opt.toUpperCase()}</option>
                                ))}
                                </select>
                            </div>
                            );
                        })}
                        </div>
                        
                        <div className="mt-8 p-4 bg-indigo-50 rounded-lg border border-indigo-100">
                        <p className="text-sm text-indigo-800 text-center">
                            Setelah semua kunci jawaban terisi, Anda siap melakukan koreksi otomatis di tab <strong>Koreksi LJK</strong>.
                        </p>
                        </div>
                    </div>
                    )}

                    {activeTab === 'koreksi' && (
                    <div className="space-y-6">
                        {!isAnswerKeyComplete() && (
                        <div className="p-4 bg-amber-50 border border-amber-200 text-amber-800 rounded-xl flex items-start gap-3">
                            <AlertCircle className="w-5 h-5 shrink-0 mt-0.5" />
                            <div>
                            <p className="font-semibold">Perhatian</p>
                            <p className="text-sm mt-1">Kunci jawaban belum lengkap. Sistem tidak dapat menghitung nilai dengan akurat. Harap lengkapi kunci jawaban untuk {totalQuestions} soal di tab <strong>Setup Kunci</strong> terlebih dahulu.</p>
                            </div>
                        </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex flex-col gap-5">
                            <div>
                            <label className="block text-sm font-semibold text-slate-700 mb-1">Nama Siswa</label>
                            <input
                                type="text"
                                value={studentName}
                                onChange={(e) => setStudentName(e.target.value)}
                                placeholder="Contoh: Budi Santoso"
                                className="w-full rounded-lg border-slate-300 border p-3 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-shadow"
                            />
                            </div>

                            <div>
                            <label className="block text-sm font-semibold text-slate-700 mb-2">Input Lembar Jawaban (Foto)</label>
                            
                            <div className="grid grid-cols-2 gap-3 mb-4">
                                <button 
                                onClick={() => cameraInputRef.current?.click()}
                                className="flex flex-col items-center justify-center gap-2 bg-slate-50 hover:bg-slate-100 border border-dashed border-slate-300 rounded-lg p-4 transition-colors text-slate-600"
                                >
                                <Camera className="w-6 h-6" />
                                <span className="text-xs font-medium">Buka Kamera</span>
                                <input 
                                    type="file" 
                                    accept="image/*" 
                                    capture="environment" 
                                    className="hidden" 
                                    ref={cameraInputRef}
                                    onChange={handleImageUpload}
                                />
                                </button>

                                <button 
                                onClick={() => fileInputRef.current?.click()}
                                className="flex flex-col items-center justify-center gap-2 bg-slate-50 hover:bg-slate-100 border border-dashed border-slate-300 rounded-lg p-4 transition-colors text-slate-600"
                                >
                                <Upload className="w-6 h-6" />
                                <span className="text-xs font-medium">Unggah File</span>
                                <input 
                                    type="file" 
                                    accept="image/jpeg, image/png" 
                                    className="hidden" 
                                    ref={fileInputRef}
                                    onChange={handleImageUpload}
                                />
                                </button>
                            </div>

                            {imagePreview ? (
                                <div className="relative rounded-lg overflow-hidden border border-slate-200 bg-slate-50 flex items-center justify-center min-h-[200px]">
                                <img src={imagePreview} alt="Preview" className="max-h-[300px] object-contain" />
                                <button 
                                    onClick={() => {setImagePreview(null); setImageFile(null);}}
                                    className="absolute top-2 right-2 bg-red-500/80 text-white p-1.5 rounded-full hover:bg-red-600 transition-colors backdrop-blur-sm"
                                >
                                    <XCircle className="w-5 h-5" />
                                </button>
                                </div>
                            ) : (
                                <div className="rounded-lg border border-dashed border-slate-200 bg-slate-50 flex flex-col items-center justify-center min-h-[200px] text-slate-400">
                                <ImageIcon className="w-10 h-10 mb-2 opacity-50" />
                                <span className="text-sm">Belum ada gambar yang dipilih</span>
                                </div>
                            )}
                            </div>

                            <div className="pt-2">
                            <button
                                onClick={handleProcessImage}
                                disabled={isProcessing || !imageFile || !studentName.trim() || !isAnswerKeyComplete()}
                                className="w-full flex items-center justify-center gap-2 bg-indigo-600 text-white py-3 px-4 rounded-lg font-semibold hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                            >
                                {isProcessing ? (
                                <>
                                    <Loader2 className="w-5 h-5 animate-spin" />
                                    Sedang Mengoreksi...
                                </>
                                ) : (
                                <>
                                    <CheckCircle className="w-5 h-5" />
                                    Koreksi Sekarang
                                </>
                                )}
                            </button>
                            </div>
                        </div>

                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                            <div className="bg-slate-50 p-4 border-b border-slate-200">
                            <h2 className="text-base font-bold text-slate-800">Hasil Koreksi</h2>
                            </div>
                            
                            <div className="p-5 flex-1 flex flex-col">
                            {isProcessing ? (
                                <div className="flex-1 flex flex-col items-center justify-center text-indigo-600 gap-4 py-12">
                                <Loader2 className="w-12 h-12 animate-spin opacity-80" />
                                <p className="text-sm font-medium animate-pulse text-center px-4">
                                    AI sedang membaca pola Lembar Jawaban...<br/>
                                    <span className="text-xs text-slate-500">Menganalisa coretan & tanda silang</span>
                                </p>
                                </div>
                            ) : currentResult ? (
                                <div>
                                <div className="text-center mb-6">
                                    <p className="text-sm text-slate-500 uppercase tracking-wider font-semibold mb-1">Nilai Akhir</p>
                                    <div className="text-6xl font-black text-indigo-600 mb-2">{currentResult.score}</div>
                                    <p className="text-lg font-bold text-slate-800">{currentResult.name}</p>
                                </div>

                                <div className="grid grid-cols-3 gap-3 mb-6">
                                    <div className="bg-green-50 p-3 rounded-lg border border-green-100 text-center">
                                    <div className="text-2xl font-bold text-green-600">{currentResult.correct}</div>
                                    <div className="text-xs font-medium text-green-800 mt-1">BENAR</div>
                                    </div>
                                    <div className="bg-red-50 p-3 rounded-lg border border-red-100 text-center">
                                    <div className="text-2xl font-bold text-red-600">{currentResult.wrong}</div>
                                    <div className="text-xs font-medium text-red-800 mt-1">SALAH</div>
                                    </div>
                                    <div className="bg-slate-100 p-3 rounded-lg border border-slate-200 text-center">
                                    <div className="text-2xl font-bold text-slate-600">{currentResult.empty}</div>
                                    <div className="text-xs font-medium text-slate-700 mt-1">KOSONG</div>
                                    </div>
                                </div>

                                <div className="border border-slate-100 rounded-lg overflow-hidden">
                                    <div className="bg-slate-50 px-3 py-2 text-xs font-bold text-slate-500 flex justify-between">
                                    <span>Detail Jawaban Siswa</span>
                                    </div>
                                    <div className="p-3 max-h-[220px] overflow-y-auto no-scrollbar grid grid-cols-4 gap-x-2 gap-y-1 text-xs">
                                    {Array.from({ length: totalQuestions }).map((_, idx) => {
                                        const num = idx + 1;
                                        const detail = currentResult.details[num];
                                        const isCorrect = detail.status === 'correct';
                                        const isEmpty = detail.status === 'empty';
                                        
                                        let bgColor = isCorrect ? 'bg-green-100 text-green-800' : 
                                                    isEmpty ? 'bg-slate-100 text-slate-500' : 'bg-red-100 text-red-800';
                                        
                                        return (
                                        <div key={num} className={`flex justify-between items-center px-1.5 py-1 rounded ${bgColor}`}>
                                            <span className="font-semibold w-5 text-right">{num}.</span>
                                            <span className="uppercase font-bold">{detail.studentAnswer}</span>
                                        </div>
                                        )
                                    })}
                                    </div>
                                </div>

                                <button 
                                    onClick={resetForm}
                                    className="mt-6 w-full py-2.5 border-2 border-indigo-600 text-indigo-600 font-semibold rounded-lg hover:bg-indigo-50 transition-colors"
                                >
                                    Koreksi Siswa Berikutnya
                                </button>
                                </div>
                            ) : (
                                <div className="flex-1 flex flex-col items-center justify-center text-slate-400 gap-3 py-12">
                                <CheckCircle className="w-12 h-12 opacity-20" />
                                <p className="text-sm font-medium text-center px-8">Hasil koreksi akan muncul di sini setelah Anda memproses gambar.</p>
                                </div>
                            )}
                            </div>
                        </div>
                        </div>
                    </div>
                    )}

                    {activeTab === 'database' && (
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="p-5 border-b border-slate-200 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <div>
                            <h2 className="text-lg font-bold text-slate-800">Data Hasil Koreksi</h2>
                            <p className="text-sm text-slate-500">Total {resultsDB.length} siswa telah dikoreksi.</p>
                        </div>
                        
                        <div className="flex items-center gap-2">
                            <button
                            onClick={exportToCSV}
                            disabled={resultsDB.length === 0}
                            className="flex items-center gap-2 bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-emerald-700 disabled:opacity-50 transition-colors"
                            >
                            <FileSpreadsheet className="w-4 h-4" /> Export Excel (CSV)
                            </button>
                        </div>
                        </div>

                        <div className="overflow-x-auto">
                        <table className="w-full text-sm text-left">
                            <thead className="text-xs text-slate-500 uppercase bg-slate-50">
                            <tr>
                                <th className="px-6 py-3">Waktu</th>
                                <th className="px-6 py-3">Nama Siswa</th>
                                <th className="px-6 py-3 text-center">Benar</th>
                                <th className="px-6 py-3 text-center">Salah</th>
                                <th className="px-6 py-3 text-center">Kosong</th>
                                <th className="px-6 py-3 text-center font-bold text-indigo-600">Nilai Akhir</th>
                            </tr>
                            </thead>
                            <tbody>
                            {resultsDB.length === 0 ? (
                                <tr>
                                <td colSpan="6" className="px-6 py-8 text-center text-slate-400">
                                    Belum ada data hasil koreksi.
                                </td>
                                </tr>
                            ) : (
                                resultsDB.map((row) => (
                                <tr key={row.id} className="bg-white border-b hover:bg-slate-50 transition-colors">
                                    <td className="px-6 py-4 text-slate-500 whitespace-nowrap">{row.date.split(',')[1] || row.date}</td>
                                    <td className="px-6 py-4 font-semibold text-slate-800">{row.name}</td>
                                    <td className="px-6 py-4 text-center text-green-600 font-medium">{row.correct}</td>
                                    <td className="px-6 py-4 text-center text-red-600 font-medium">{row.wrong}</td>
                                    <td className="px-6 py-4 text-center text-slate-500">{row.empty}</td>
                                    <td className="px-6 py-4 text-center font-bold text-lg text-indigo-600">{row.score}</td>
                                </tr>
                                ))
                            )}
                            </tbody>
                        </table>
                        </div>
                        
                        {resultsDB.length > 0 && (
                        <div className="p-4 bg-slate-50 border-t border-slate-200 text-right">
                            <button 
                            onClick={clearDatabase}
                            className="text-xs text-red-600 hover:text-red-800 font-medium px-3 py-1.5 rounded hover:bg-red-50 transition-colors"
                            >
                            Hapus Semua Data
                            </button>
                        </div>
                        )}
                    </div>
                    )}

                </main>
                </div>
            );
        }

        // Render aplikasi
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
