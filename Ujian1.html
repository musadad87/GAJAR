<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Ujian UKK - SMK Mutakhir Petir</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons via CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .active-tab {
            background-color: #4d1664 !important;
            color: white !important;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transform: scale(1.02);
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800">

    <!-- 1. HEADER AREA -->
    <header class="relative bg-gradient-to-r from-[#2c104d] via-[#4d1664] to-[#6a1a5b] overflow-hidden text-white shadow-xl">
        <div class="absolute inset-0 opacity-20">
            <div class="absolute top-4 right-10 flex space-x-12">
                <i data-lucide="settings" class="w-16 h-16 text-blue-300 animate-[spin_10s_linear_infinite]"></i>
                <i data-lucide="microscope" class="w-16 h-16 text-purple-300"></i>
                <i data-lucide="cpu" class="w-16 h-16 text-pink-300"></i>
            </div>
        </div>

        <div class="relative z-10 container mx-auto px-4 py-8 lg:py-12 flex flex-col lg:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-6 w-full">
                <div class="bg-white rounded-full h-20 w-20 md:h-24 md:w-24 flex-shrink-0 flex items-center justify-center p-1.5 shadow-lg border-4 border-purple-200 overflow-hidden">
                    <img src="https://musadad87.github.io/GAJAR/Logo%20Mutaakhirin-3.png" alt="Logo SMK Mutakhir Petir" class="w-full h-full object-contain" />
                </div>
                <div class="flex-1">
                    <h1 class="text-lg md:text-2xl font-extrabold tracking-wide uppercase">SMK Mutakhir Petir</h1>
                    <h2 class="text-2xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-purple-200">UJI KOMPETENSI KEAHLIAN</h2>
                    <p class="text-sm md:text-lg font-medium text-purple-100">Tahun Pelajaran 2025/2026</p>
                </div>
            </div>
        </div>
    </header>

    <!-- 2. MAIN CONTENT -->
    <main class="container mx-auto px-4 -mt-8 relative z-20 max-w-5xl">
        
        <!-- TANGGAL -->
        <div class="bg-white rounded-xl shadow-lg p-5 flex items-center justify-center gap-4 border border-slate-100">
            <div class="bg-purple-100 p-3 rounded-lg text-[#4d1664]">
                <i data-lucide="calendar" class="w-7 h-7"></i>
            </div>
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Hari & Tanggal</p>
                <p class="text-lg font-bold text-slate-800">Rabu, 29 April 2026</p>
            </div>
        </div>

        <!-- NAVIGASI SESI -->
        <div class="mt-8 grid grid-cols-1 sm:grid-cols-2 gap-3">
            <button id="nav-jam1" onclick="switchSession('jam1')" class="py-4 px-6 rounded-xl font-bold text-lg border-2 border-transparent bg-white shadow-sm transition-all duration-300 flex items-center justify-center gap-2">
                <i data-lucide="clock-3" class="w-5 h-5"></i> Jam Pertama
            </button>
            <button id="nav-jam2" onclick="switchSession('jam2')" class="py-4 px-6 rounded-xl font-bold text-lg border-2 border-transparent bg-white shadow-sm transition-all duration-300 flex items-center justify-center gap-2">
                <i data-lucide="clock-9" class="w-5 h-5"></i> Jam Kedua
            </button>
        </div>

        <!-- AREA SOAL -->
        <div class="mt-6 bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-10 mb-12">
            <div id="content-area" class="text-center">
                <div id="session-icon" class="w-20 h-20 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-6 text-[#4d1664]">
                    <i data-lucide="book-open" class="w-10 h-10"></i>
                </div>
                
                <h3 id="session-title" class="text-xl font-bold text-slate-500 mb-2 uppercase tracking-widest">Sesi Ujian</h3>
                <p id="session-desc" class="text-slate-400 mb-8">Pilih mata pelajaran yang sesuai dengan jurusan Anda:</p>

                <!-- Container Tombol Mata Pelajaran -->
                <div id="subject-container" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <!-- Tombol akan di-generate oleh JS -->
                </div>
            </div>
        </div>

    </main>

    <script>
        let currentSession = 'jam1';

        const subjects = {
            'jam1': [
                { name: 'AKUNTANSI', link: 'https://forms.gle/SGRP2U3SHNJFmW2T9', color: 'bg-indigo-600' },
                { name: 'AGRIBISNIS', link: 'https://forms.gle/TYMc6k3Pb781X8yWA', color: 'bg-emerald-600' },
                { name: 'TSM', link: 'https://docs.google.com/forms/d/e/1FAIpQLScideJU2OO3CxRkcpLYV16dt1yPPSG3lfve1VFn-2gHYGxGnw/formResponse', color: 'bg-rose-600' }
            ],
            'jam2': [
                { name: 'PAI (Pendidikan Agama Islam)', link: 'https://forms.gle/jv7wASQ7er4ia1Q68', color: 'bg-purple-600' }
            ]
        };

        function switchSession(session) {
            currentSession = session;
            renderUI();
        }

        function renderUI() {
            const container = document.getElementById('subject-container');
            const nav1 = document.getElementById('nav-jam1');
            const nav2 = document.getElementById('nav-jam2');
            const desc = document.getElementById('session-desc');
            const sessionTitle = document.getElementById('session-title');
            
            // Reset Navigasi
            nav1.classList.remove('active-tab');
            nav2.classList.remove('active-tab');
            
            if(currentSession === 'jam1') {
                nav1.classList.add('active-tab');
                sessionTitle.innerText = "Sesi Kejuruan";
                desc.innerText = "Silakan klik jurusan Anda untuk memulai ujian:";
                container.classList.add('md:grid-cols-3');
                container.classList.remove('md:grid-cols-1');
            } else {
                nav2.classList.add('active-tab');
                sessionTitle.innerText = "Sesi Umum";
                desc.innerText = "Silakan klik mata pelajaran di bawah ini:";
                container.classList.remove('md:grid-cols-3');
                container.classList.add('md:grid-cols-1');
            }

            // Render Tombol
            container.innerHTML = '';
            subjects[currentSession].forEach(sub => {
                const btn = document.createElement('button');
                btn.className = `${sub.color} hover:opacity-90 text-white font-bold py-6 px-6 rounded-xl shadow-lg transition-all transform hover:-translate-y-1 flex flex-col items-center justify-center gap-3 w-full`;
                btn.onclick = () => window.location.href = sub.link;
                
                btn.innerHTML = `
                    <i data-lucide="file-text" class="w-8 h-8"></i>
                    <span class="text-lg">${sub.name}</span>
                `;
                container.appendChild(btn);
            });

            // Re-render icons
            lucide.createIcons();
        }

        document.addEventListener("DOMContentLoaded", () => {
            renderUI();
            lucide.createIcons();
        });
    </script>
</body>
</html>
