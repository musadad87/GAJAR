
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Ujian UKK - SMK Mutakhir Petir</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons via CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom Font (Opsional) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800">

    <!-- 1. HEADER / BANNER AREA -->
    <header class="relative bg-gradient-to-r from-[#2c104d] via-[#4d1664] to-[#6a1a5b] overflow-hidden text-white shadow-xl">
        
        <!-- Latar Belakang Dekoratif (Garis & Ikon Teknologi) -->
        <div class="absolute inset-0 opacity-20">
            <div class="absolute top-4 right-10 flex space-x-12">
                <i data-lucide="settings" class="w-16 h-16 text-blue-300 animate-[spin_10s_linear_infinite]"></i>
                <i data-lucide="microscope" class="w-16 h-16 text-purple-300"></i>
                <i data-lucide="cpu" class="w-16 h-16 text-pink-300"></i>
            </div>
            <svg class="absolute w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <path d="M0,50 Q100,20 200,60 T400,50 T600,80 T800,40" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" />
                <path d="M0,100 Q150,150 250,90 T500,120 T700,90 T1000,130" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
            </svg>
        </div>

        <!-- Konten Utama Header -->
        <div class="relative z-10 container mx-auto px-4 py-8 lg:py-12 flex flex-col lg:flex-row items-center lg:items-start justify-between gap-6">
            
            <div class="flex items-center gap-6 w-full">
                <!-- Logo Sekolah -->
                <div class="bg-white rounded-full h-24 w-24 flex-shrink-0 flex items-center justify-center p-1.5 shadow-[0_0_15px_rgba(255,255,255,0.3)] border-4 border-purple-200 overflow-hidden">
                    <img 
                        src="https://musadad87.github.io/GAJAR/Logo%20Mutaakhirin-3.png" 
                        alt="Logo SMK Mutakhir Petir" 
                        class="w-full h-full object-contain"
                    />
                </div>

                <!-- Teks Header -->
                <div class="flex-1">
                    <h1 class="text-xl md:text-3xl font-extrabold tracking-wide drop-shadow-md">
                        SMK MUTAKHIR PETIR
                    </h1>
                    <h2 class="text-2xl md:text-4xl font-black mt-1 mb-2 text-transparent bg-clip-text bg-gradient-to-r from-white to-purple-200 drop-shadow-lg">
                        UJI KOMPETENSI KEAHLIAN (UKK)
                    </h2>
                    <p class="text-sm md:text-lg font-medium text-purple-100">
                        Tahun Pelajaran 2025/2026
                    </p>
                </div>
            </div>

            <div class="hidden lg:flex items-end justify-end h-full w-full absolute bottom-4 right-6">
                <p class="font-bold tracking-widest text-sm text-purple-200 uppercase">
                    Petir, Serang - Banten
                </p>
            </div>
        </div>
    </header>

    <!-- 2. MAIN CONTENT -->
    <main class="container mx-auto px-4 -mt-8 relative z-20 max-w-5xl">
        
        <!-- INFORMASI HARI DAN MATA PELAJARAN (Floating Card) -->
        <div class="bg-white rounded-xl shadow-lg p-5 flex flex-col md:flex-row items-center justify-center gap-4 border border-slate-100">
            <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="bg-purple-100 p-3 rounded-lg text-[#4d1664]">
                    <i data-lucide="calendar" class="w-7 h-7"></i>
                </div>
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Hari & Tanggal</p>
                    <p class="text-lg font-bold text-slate-800">Senin, 27 April 2026</p>
                </div>
            </div>
        </div>

        <!-- 3. MENU NAVIGASI (Soal Jam Pertama & Jam Kedua) -->
        <div class="mt-8 bg-white p-2 rounded-xl shadow-sm flex flex-col sm:flex-row gap-2 border border-slate-200">
            <button id="btn-jam1" onclick="setSession('jam1')" class="flex-1 flex items-center justify-center gap-2 py-4 px-6 rounded-lg font-bold text-lg transition-all duration-300">
                <i data-lucide="clock" class="w-5 h-5"></i>
                Soal Jam Pertama
            </button>
            
            <button id="btn-jam2" onclick="setSession('jam2')" class="flex-1 flex items-center justify-center gap-2 py-4 px-6 rounded-lg font-bold text-lg transition-all duration-300">
                <i data-lucide="clock" class="w-5 h-5"></i>
                Soal Jam Kedua
            </button>
        </div>

        <!-- Area Konten Dinamis -->
        <div class="mt-6 bg-white rounded-xl shadow-sm border border-slate-200 p-8 min-h-[300px] flex flex-col items-center justify-center mb-12">
            <div class="text-center max-w-lg mx-auto">
                <div class="w-20 h-20 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-6 text-[#4d1664]">
                    <i data-lucide="book" class="w-10 h-10"></i>
                </div>
                
                <h3 id="mapel-title" class="text-2xl md:text-3xl font-bold text-slate-800 mb-4">
                    Mata Pelajaran: IPAS
                </h3>
                
                <p class="text-slate-500 mb-8">
                    Silakan klik tombol di bawah ini untuk langsung menuju lembar pengerjaan soal ujian Anda.
                </p>
                
                <button onclick="mulaiUjian()" class="bg-pink-600 hover:bg-pink-700 text-white font-bold py-4 px-8 rounded-full shadow-lg transition-all transform hover:scale-105 flex items-center gap-3 mx-auto">
                    <i data-lucide="check-circle" class="w-6 h-6"></i>
                    <span id="btn-text" class="text-lg">Mulai Kerjakan Jam Pertama</span>
                </button>
            </div>
        </div>

    </main>

    <!-- Lojik JavaScript untuk mengatur tab dan link -->
    <script>
        let activeSession = 'jam1';

        // Kelas utility dari Tailwind untuk merubah warna tab
        const activeClasses = ['bg-[#4d1664]', 'text-white', 'shadow-md', 'transform', 'scale-[1.01]'];
        const inactiveClasses = ['bg-slate-50', 'text-slate-500', 'hover:bg-slate-100'];

        function updateUI() {
            const btnJam1 = document.getElementById('btn-jam1');
            const btnJam2 = document.getElementById('btn-jam2');
            const mapelTitle = document.getElementById('mapel-title');
            const btnText = document.getElementById('btn-text');

            if (activeSession === 'jam1') {
                // Set Tab Jam 1 Aktif
                btnJam1.classList.add(...activeClasses);
                btnJam1.classList.remove(...inactiveClasses);
                // Set Tab Jam 2 Inaktif
                btnJam2.classList.remove(...activeClasses);
                btnJam2.classList.add(...inactiveClasses);

                // Ubah Teks
                mapelTitle.innerText = 'Mata Pelajaran: IPAS';
                btnText.innerText = 'Mulai Kerjakan Jam Pertama';
            } else {
                // Set Tab Jam 2 Aktif
                btnJam2.classList.add(...activeClasses);
                btnJam2.classList.remove(...inactiveClasses);
                // Set Tab Jam 1 Inaktif
                btnJam1.classList.remove(...activeClasses);
                btnJam1.classList.add(...inactiveClasses);

                // Ubah Teks pelajaran2
                mapelTitle.innerText = 'Mata Pelajaran: Matematika';
                btnText.innerText = 'Mulai Kerjakan Jam Kedua';
            }
        }

        function setSession(sessionName) {
            activeSession = sessionName;
            updateUI();
        }

        function mulaiUjian() {
            if (activeSession === 'jam1') {
                window.location.href = 'https://docs.google.com/forms/d/e/1FAIpQLSetJgoQbgxOCYn4peUDO-NOiKpFmj5QsglX1ufDFe5y1mRLBA/viewform?usp=header';
            } else {
                //https://presenter.jivrus.com/p/1Em2v7iG7F3wf6ouUSy_XSpPFtsF6qlI8kLlv9OzI26E
                window.location.href = 'https://musadad87.github.io/GAJAR/ujianblm.html';
            }
        }

        // Inisialisasi saat halaman pertama dimuat
        document.addEventListener("DOMContentLoaded", () => {
            updateUI();
            lucide.createIcons(); // Merender ikon lucide
        });
    </script>
</body>
</html>
